<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aatiq Smart Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") no-repeat center/cover;
    color:white;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.center{
    position:relative;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.welcome{
    text-align:center;
}

.welcome button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:#00c6ff;
    color:black;
}

.calculator{
    display:none;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    padding:15px;
    border-radius:20px;
    width:90%;
    max-width:320px;
}

.display{
    background:black;
    padding:15px;
    border-radius:10px;
    font-size:24px;
    text-align:right;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

button{
    height:55px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:18px;
}

.equal{
    background:#00c6ff;
    color:black;
}

.back{
    margin-bottom:10px;
    cursor:pointer;
}

.voice{
    position:fixed;
    bottom:70px;
    right:15px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#00c6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.footer{
    position:fixed;
    bottom:8px;
    right:10px;
    font-size:11px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="center">

<div class="welcome" id="welcome">
    <h2>السلام عليكم ورحمة الله وبركاته</h2>
    <p>Welcome to Aatiq's Calculator</p>
    <button onclick="enter()">Enter</button>
</div>

<div class="calculator" id="calc">
    <div class="back" onclick="back()">← Back</div>

    <div class="display" id="display">0</div>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="append('+')">+</button>
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
    </div>
</div>

</div>

<div class="voice" onclick="voice()">🎤</div>
<div class="footer">© 2026 Aatiq</div>

<script>
let display=document.getElementById("display");

/* ------------------- */
/* NORMAL VOICE (FALLBACK) */
/* ------------------- */
function fallbackSpeak(text){
    let msg=new SpeechSynthesisUtterance(text);
    msg.lang="en-GB";
    msg.rate=1;
    msg.pitch=1;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* ------------------- */
/* AI VOICE (SAFE TRY) */
/* ------------------- */
async function speak(text){
    try{
        const response = await fetch("https://api.openai.com/v1/audio/speech", {
            method:"POST",
            headers:{
                "Authorization":"Bearer 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",
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"gpt-4o-mini-tts",
                voice:"nova",
                input:text
            })
        });

        if(!response.ok) throw new Error("API failed");

        const blob=await response.blob();
        const url=URL.createObjectURL(blob);

        let audio=new Audio(url);
        audio.play();

    }catch(e){
        console.log("Fallback voice used");
        fallbackSpeak(text);
    }
}

/* ------------------- */
/* ENTER */
/* ------------------- */
function enter(){
    speak("Assalamu Alaikum wa Rahmatullahi wa Barakatuh. Welcome.");
    setTimeout(()=>{
        welcome.style.display="none";
        calc.style.display="block";
    },2000);
}

/* BACK */
function back(){
    calc.style.display="none";
    welcome.style.display="block";
}

/* CALC */
function append(v){
    if(display.innerText==="0") display.innerText=v;
    else display.innerText+=v;
}

function clearDisplay(){ display.innerText="0"; }

function backspace(){
    display.innerText=display.innerText.slice(0,-1)||"0";
}

function calculate(){
    try{
        let result=eval(display.innerText);
        display.innerText=result;
        speak("The answer is " + result);
    }catch{
        display.innerText="Error";
        speak("Error");
    }
}

/* VOICE INPUT */
function voice(){
    let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="en-GB";

    rec.onresult=(e)=>{
        let t=e.results[0][0].transcript.toLowerCase();

        t=t.replace(/plus/g,"+")
           .replace(/minus/g,"-")
           .replace(/multiply|into/g,"*")
           .replace(/divide/g,"/")
           .replace(/[^0-9+\-*/%.]/g,"");

        display.innerText=t;
        calculate();
    };

    rec.start();
}
</script>

</body>
</html>
